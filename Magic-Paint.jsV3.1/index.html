<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MagicPaint.JS</title>
  <link rel="stylesheet" href="style.css?v=ui-merge-20260608-1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>

<body>
  <div id="app">

    <!-- ══ VIEW TABS BAR ══════════════════════════════════════ -->
    <div id="view-tabs">
      <button class="view-tab active" id="tab-animation" data-view="animation" title="アニメーション編集">
        <i class="ti ti-player-play"></i> アニメーション
      </button>
      <button class="view-tab" id="tab-editor" data-view="editor" title="テキストエディタ">
        <i class="ti ti-code"></i> テキストエディタ
      </button>
      <button class="view-tab" id="tab-layers" data-view="layers" title="レイヤー管理">
        <i class="ti ti-stack-2"></i> レイヤー
      </button>
    </div>

    <!-- ══ TOP BAR ════════════════════════════════════════════ -->
    <div id="topbar">
      <!-- ファイルメニュー -->
      <div id="file-wrap">
        <button id="file-btn" onclick="toggleFileMenu()">
          <i class="ti ti-files"></i>
        </button>
        <div id="file-menu">
          <div class="fm-item" onclick="newProject()"><i class="ti ti-file-plus"></i>新規</div>
          <div class="fm-item" onclick="saveProject()"><i class="ti ti-device-floppy"></i>保存<span
              class="fm-kbd">⌘S</span></div>
          <div class="fm-item" onclick="exportMLC()">
            <i class="ti ti-file-export"></i>
            .mlc書き出し
          </div>
          <div class="fm-item" onclick="openMLC()">
            <i class="ti ti-file-import"></i>
            <span>.mlcを読み込み</span>
          </div>
          <div class="fm-item" onclick="openProject()"><i class="ti ti-folder-open"></i>開く</div>
          <div class="fm-sep"></div>
          <div class="fm-item" onclick="exportHTML()"><i class="ti ti-brand-html5"></i>HTML書き出し</div>
          <div class="fm-item" onclick="exportPNG()"><i class="ti ti-photo"></i>PNG書き出し</div>
          <div class="fm-item" onclick="exportJS()"><i class="ti ti-code"></i>JS書き出し</div>
        </div>
      </div>

      <div class="tb-sep"></div>

      <!-- カラーピッカー + パレット -->
      <div id="color-area">
        <div id="cur-color" onclick="document.getElementById('cpicker').click()"></div>
        <input type="color" id="cpicker" value="#3B8AE6">
        <div id="palette">
          <div class="pdot" style="background:#e74c3c" data-c="#e74c3c"></div>
          <div class="pdot" style="background:#e67e22" data-c="#e67e22"></div>
          <div class="pdot" style="background:#f1c40f" data-c="#f1c40f"></div>
          <div class="pdot" style="background:#2ecc71" data-c="#2ecc71"></div>
          <div class="pdot" style="background:#3B8AE6" data-c="#3B8AE6"></div>
          <div class="pdot" style="background:#9b59b6" data-c="#9b59b6"></div>
          <div class="pdot" style="background:#ffffff;border:1px solid #555" data-c="#ffffff"></div>
          <div class="pdot" style="background:#888" data-c="#888888"></div>
        </div>
      </div>

      <div class="tb-sep"></div>

      <!-- 塗りつぶし -->
      <label class="tb-chk"><input type="checkbox" id="fill-chk"> 塗り</label>

      <div class="tb-sep"></div>

      <!-- 操作 -->
      <button class="tb-btn" id="undo-btn" title="元に戻す Ctrl+Z"><i class="ti ti-arrow-back-up"></i></button>
      <button class="tb-btn" id="redo-btn" title="やり直し"><i class="ti ti-arrow-forward-up"></i></button>
      <button class="tb-btn danger" id="del-btn" title="選択削除 Esc"><i class="ti ti-trash"></i></button>
      <button class="tb-btn" id="group-btn" title="選択中の同じグループを作る Ctrl+G"><i class="ti ti-box-multiple"></i>
        グループ</button>
      <button class="tb-btn" id="ungroup-btn" title="グループ解除 Ctrl+U"><i class="ti ti-box"></i> 解除</button>
      <button class="tb-btn" onclick="bringForward()" title="前面へ"><i class="ti ti-square-arrow-up"></i></button>
      <button class="tb-btn" onclick="sendBackward()" title="後面へ"><i class="ti ti-square-arrow-down"></i></button>
      <button class="tb-btn" onclick="bringToFront()" title="最前面へ"><i class="ti ti-layout-navbar-collapse"></i></button>
      <button class="tb-btn" onclick="sendToBack()" title="最背面へ"><i
          class="ti ti-layout-bottombar-collapse"></i></button>

      <div class="tb-sep"></div>

      <label class="tb-chk" title="キャンバス背景色">
        <i class="ti ti-background" style="font-size:13px;color:var(--fg2)"></i>
        <input type="color" id="canvas-bg-picker" value="#111111"
          style="width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);cursor:pointer;padding:1px">
      </label>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="ruler-toggle-btn" onclick="toggleRuler()" title="定規の表示/非表示">
        <i class="ti ti-ruler"></i>
      </button>
      <button class="tb-btn accent" onclick="openPreview()" title="プレビュー Ctrl+P">
        <i class="ti ti-external-link"></i> プレビュー
      </button>

      <button class="tb-btn" id="mods-btn" title="MOD一覧">
        <i class="ti ti-puzzle"></i> MOD
      </button>

      <button class="tb-btn accent" id="ai-btn" title="AIアシスタント">
        <i class="ti ti-sparkles"></i> AI
      </button>

      <!-- 右寄せ -->
      <span id="status-txt" style="margin-left:auto;font-size:11px;color:var(--fg3);padding:0 10px">準備完了</span>
      <span id="proj-name" style="font-size:11px;color:var(--fg3);padding-right:10px">無題.mlc</span>
    </div>

    <!-- ══ EDITOR TOP BAR（テキストエディタ専用）═══════════════ -->
    <div id="editor-topbar">
      <button class="tb-btn accent" onclick="openPreview()" title="プレビュー Ctrl+P">
        <i class="ti ti-external-link"></i> プレビュー
      </button>
      <div class="tb-sep"></div>
      <div id="editor-mod-ui-area"></div>
    </div>

    <!-- ══ WORKSPACE ══════════════════════════════════════════ -->
    <div id="workspace">

      <!-- 左パネル: プロパティ -->
      <div id="left-panel">

        <div id="panel-empty">
          <i class="ti ti-cursor-text" style="font-size:28px;color:var(--fg3)"></i>
          <p>図形を選択すると<br>プロパティが表示されます</p>
        </div>

        <div id="panel-props" style="display:none">
          <div class="pp-title" id="pp-title">四角形</div>

          <div class="pp-row">
            <span class="pp-label">線幅</span>
            <input type="range" id="p-sw" min="0.5" max="20" step="0.5" value="2">
            <span class="pp-val" id="p-sw-v">2</span>
          </div>
          <div class="pp-row" id="row-rr">
            <span class="pp-label">角丸</span>
            <input type="range" id="p-rr" min="0" max="100" step="1" value="0">
            <span class="pp-val" id="p-rr-v">0</span>
          </div>
          <div class="pp-row" id="row-sides">
            <span class="pp-label">頂点数</span>
            <input type="range" id="p-sides" min="3" max="12" step="1" value="6">
            <span class="pp-val" id="p-sides-v">6</span>
          </div>
          <div class="pp-row">
            <span class="pp-label">角度</span>
            <input type="range" id="p-rot" min="0" max="360" step="1" value="0">
            <span class="pp-val" id="p-rot-v">0°</span>
          </div>
          <div class="pp-row">
            <span class="pp-label">透明度</span>
            <input type="range" id="p-opa" min="0" max="100" step="1" value="100">
            <span class="pp-val" id="p-opa-v">100%</span>
          </div>
          <div class="pp-row">
            <span class="pp-label">線スタイル</span>
            <select id="p-dash">
              <option value="0">実線</option>
              <option value="8,4">破線</option>
              <option value="2,4">点線</option>
              <option value="12,4,3,4">一点鎖線</option>
            </select>
          </div>

          <div class="pp-sep"></div>
          <div class="pp-sec-title">アニメーション</div>
          <button class="pp-btn" id="btn-set-path"><i class="ti ti-route"></i> パスを描く</button>
          <button class="pp-btn danger" id="btn-clear-anim"><i class="ti ti-x"></i> パス削除</button>
          <div class="pp-row path-time-row" id="row-path-time" style="display:none">
            <span class="pp-label">パス時間</span>
            <span class="pp-val path-time-info" id="path-time-info">0.00s - 3.00s</span>
            <button class="pp-mini-btn" id="btn-path-start-now" title="現在の再生位置にKFを追加してパス開始にする"><i class="ti ti-player-play"></i></button>
            <button class="pp-mini-btn" id="btn-path-end-now" title="現在の再生位置をパス終了にする"><i class="ti ti-player-stop"></i></button>
          </div>
          <div class="pp-row path-duration-row" id="row-path-duration" style="display:none">
            <span class="pp-label">秒数</span>
            <input type="number" id="p-path-duration" min="0.05" max="120" step="0.1" value="3">
            <span class="pp-val">s</span>
            <button class="pp-mini-btn" id="btn-path-duration-apply" title="赤い再生位置から指定秒数でパスを実行"><i class="ti ti-clock-play"></i></button>
          </div>
          <div class="pp-row" id="row-anim-rot" style="margin-top:6px">
            <span class="pp-label">回転角度</span>
            <input type="number" id="p-anim-rot" min="-3600" max="3600" step="1" value="0">
            <span class="pp-val" id="p-anim-rot-v">0°</span>
            <button class="pp-mini-btn" id="btn-rotation-kf" title="現在の再生位置にこの角度の回転KFを追加/更新"><i class="ti ti-diamond"></i></button>
          </div>
          <div class="pp-row" id="row-anim-rot-speed" style="margin-top:2px">
            <span class="pp-label">回転速度</span>
            <input type="number" id="p-anim-rot-speed" min="-3600" max="3600" step="0.1" value="0">
            <span class="pp-val">°/s</span>
          </div>
          <div class="pp-row" id="row-anim-rot-dur" style="margin-top:2px">
            <span class="pp-label">回転時間</span>
            <input type="number" id="p-anim-rot-dur" min="0.05" max="120" step="0.1" value="1">
            <span class="pp-val">s</span>
          </div>

        </div>
      </div>

      <!-- キャンバス -->
      <div id="canvas-area">
        <!-- grid: コーナー | 上定規 -->
        <!--        左定規   | キャンバス -->
        <div id="ruler-corner"></div>
        <canvas id="ruler-h"></canvas>
        <canvas id="ruler-v"></canvas>
        <div id="cv-wrap">
          <canvas id="cv"></canvas>
          <canvas id="cv-three" aria-hidden="true"></canvas>
        </div>
      </div>

      <!-- 右パネル: ツール -->
      <div id="right-panel">
        <div class="rp-label">図形</div>
        <button class="rp-btn active" data-tool="select" title="選択 V"><i class="ti ti-cursor-text"></i></button>
        <button class="rp-btn" data-tool="rect" title="四角形 R"><i class="ti ti-square"></i></button>
        <button class="rp-btn" data-tool="circle" title="円 C"><i class="ti ti-circle"></i></button>
        <button class="rp-btn" data-tool="triangle" title="三角形 T"><i class="ti ti-triangle"></i></button>
        <button class="rp-btn" data-tool="polygon" title="多角形 P"><i class="ti ti-hexagon"></i></button>
        <button class="rp-btn" data-tool="line" title="直線 L"><i class="ti ti-minus"></i></button>

        <div class="rp-sep"></div>
        <div class="rp-label">描画</div>
        <button class="rp-btn" data-tool="pen" title="ペン"><i class="ti ti-pencil"></i></button>
        <button class="rp-btn" data-tool="brush" title="ブラシ"><i class="ti ti-brush"></i></button>

        <div class="rp-sep"></div>
        <div class="rp-label">操作</div>
        <button class="rp-btn" data-tool="eraser" title="消しゴム E"><i class="ti ti-eraser"></i></button>
        <button class="rp-btn" data-tool="path" title="アニメパス"><i class="ti ti-route"></i></button>

      </div>
    </div>

    <!-- ══ TIMELINE ═══════════════════════════════════════════ -->
    <div id="timeline">
      <div id="tl-resize-handle" title="ドラッグでタイムラインの高さを調整"></div>
      <div id="tl-ctrl">
        <div id="tl-title"><i class="ti ti-player-play"></i><span>アニメーション</span></div>
        <button class="tl-btn" id="tl-rew" title="最初へ"><i class="ti ti-player-skip-back"></i></button>
        <button class="tl-btn" id="tl-play" title="再生/停止 Space"><i class="ti ti-player-play"></i></button>
        <button class="tl-btn" id="tl-fwd" title="1フレーム進む"><i class="ti ti-player-track-next"></i></button>
        <div id="fps-box" style="display:flex;align-items:center;gap:5px;margin:0 6px;">
          <span style="font-size:11px;color:var(--fg2)">FPS</span>
          <select id="fps-select"
            style="height:22px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--fg0);font-size:11px">
            <option value="12">12</option>
            <option value="24" selected>24</option>
            <option value="45">45</option>
            <option value="60">60</option>
            <option value="80">80</option>
            <option value="100">100</option>
            <option value="120">120</option>

          </select>
        </div>
        <div id="tl-timecode">
          <span id="tl-cur">0.00</span><span class="tc-sep"> / </span>
          <input id="tl-dur" type="number" value="3" min="0.5" max="60" step="0.5">s
        </div>
        <label class="tl-loop-lbl"><input type="checkbox" id="tl-loop" checked> Loop</label>

        <button class="tl-size-btn" id="tl-size-small" title="タイムラインを小さく">小</button>
        <button class="tl-size-btn" id="tl-size-medium" title="標準サイズ">中</button>
        <button class="tl-size-btn" id="tl-size-large" title="タイムラインを大きく">大</button>
        <button class="tl-size-btn" id="tl-collapse" title="タイムラインを折りたたむ">折畳</button>
        <button class="tl-btn tl-kf-btn danger" id="tl-del-kf" style="margin-left:auto" title="現在の再生位置のKFを削除">
          <i class="ti ti-diamond-off"></i> KF削除
        </button>
        <button class="tl-btn tl-kf-btn" id="tl-add-kf" title="現在の再生位置にKFを追加/更新">
          <i class="ti ti-diamond"></i> KF追加
        </button>
      </div>
      <div id="tl-body">
        <div id="tl-layers">
          <div id="tl-head">LAYERS</div>
          <div id="tl-layer-list"></div>
        </div>
        <div id="tl-scroll">
          <canvas id="tl-ruler"></canvas>
          <canvas id="tl-tracks"></canvas>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <!-- レイヤーパネル -->
  <div id="layers-panel">
    <div id="layers-panel-header">
      <i class="ti ti-stack-2"></i>
      <span>レイヤー</span>
      <div class="lp-actions">
        <button class="lp-btn" id="btn-layer-up" title="レイヤーを上へ"><i class="ti ti-arrow-up"></i></button>
        <button class="lp-btn" id="btn-layer-down" title="レイヤーを下へ"><i class="ti ti-arrow-down"></i></button>
        <button class="lp-btn" id="btn-add-folder" title="フォルダを追加"><i class="ti ti-folder-plus"></i> フォルダ</button>
        <button class="lp-btn" id="btn-add-layer" title="レイヤーを追加"><i class="ti ti-plus"></i> 追加</button>
        <button class="lp-btn danger" id="btn-del-layer" title="アクティブレイヤーを削除"><i class="ti ti-trash"></i> 削除</button>
      </div>
    </div>
    <div id="layers-list"></div>
  </div>

  <!-- JSエディタパネル -->
  <div id="js-editor-panel">
    <div id="je-header">
      <span id="je-title"><i class="ti ti-code"></i> JavaScript</span>
      <div id="je-btns">
        <select id="je-mode-select" title="実行モード">
          <option value="canvas">Canvas API</option>
        </select>
        <button class="je-btn" id="je-gen-btn" title="コードを生成"><i class="ti ti-refresh"></i> 生成</button>
        <button class="je-btn accent hidden" id="je-run-btn" title="手書きJSを実行 Ctrl+Enter"><i class="ti ti-player-play"></i>
          JS実行</button>
      </div>
    </div>
    <div id="je-body">
      <textarea id="je-code" style="display:none" spellcheck="false" placeholder="// GSAPコードをここに書いてください
// 例:
// gsap.to('.s0', { duration: 2, x: 200, rotation: 360, repeat: -1 })"></textarea>
      <div id="je-editor-col">
        <div id="je-monaco"></div>
        <div id="je-console"></div>
      </div>
      <div id="je-files">
        <div id="je-files-head">
          <span>FILES</span>
          <button id="je-file-add-btn" title="新規ファイル"><i class="ti ti-file-plus"></i></button>
        </div>
        <div id="je-files-list"></div>
      </div>
    </div>
  </div>

  <div id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

  <script>
    if (typeof gsap !== 'undefined' && typeof MotionPathPlugin !== 'undefined') {
      gsap.registerPlugin(MotionPathPlugin);
    }
  </script>
  <!-- JSZip: ZIP形式MODのインストールに使用 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- AppCore: 依存順に読み込む -->
  <script src="./AppCore/core/state.js"></script>
  <script src="./AppCore/canvas/shapes.js"></script>
  <script src="./AppCore/canvas/renderer.js"></script>
  <script src="./AppCore/core/history.js"></script>
  <script src="./AppCore/core/events.js"></script>
  <script src="./AppCore/io/project.js"></script>
  <script src="./AppCore/ui/panels.js"></script>
  <script src="./AppCore/animation/timeline.js"></script>
  <script src="./AppCore/animation/keyframe.js"></script>
  <script src="./AppCore/canvas/brush.js"></script>
  <script src="./AppCore/ui/editor.js"></script>
  <script src="./AppCore/ui/toolbar.js"></script>
  <script src="./AppCore/export/preview.js"></script>
  <script src="./AppCore/mod/api.js"></script>
  <script src="./AppCore/mod/loader.js"></script>
  <!-- AI Framework -->
  <script src="./AppCore/ai/ai_client.js"></script>
  <script src="./AppCore/ai/ai_apply.js"></script>
  <script src="./AppCore/ai/ai_panel.js"></script>
  <script src="./AppCore/app.js"></script>
  <!-- Feature Pack -->
  <script src="./AppCore/features/edit_tools.js"></script>
  <script src="./AppCore/features/viewport.js"></script>
  <script src="./AppCore/features/export_media.js"></script>
  <script src="./AppCore/features/command_palette.js"></script>
  <script src="./AppCore/features/autosave.js"></script>
  <script src="./AppCore/features/feature_toolbar.js"></script>
</body>

</html>
